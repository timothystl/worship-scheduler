name: Deploy Volunteer Worker

on:
  push:
    branches: [main]
    paths:
      - 'tlc-volunteer-worker.js'
      - 'wrangler.toml'
      - 'src/**'

jobs:
  deploy:
    name: Deploy volunteer sign-up worker (volunteer.timothystl.org)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
