name = "breeze-proxy-worker"
main = "tlc-volunteer-worker.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "volunteer.timothystl.org/*"
zone_name = "timothystl.org"
custom_domain = false

[[d1_databases]]
binding = "DB"
database_name = "tlc-volunteer-db"
database_id = "9399ee53-3386-4084-9b6b-def46b88f96a"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RSVP_STORE"
id = "3db4fdc395084ae0a9e8295c460ba08e"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "tlc-chms-photos"

[triggers]
crons = ["0 14 * * *"]

# ── Staging environment ────────────────────────────────────────────────────────
# Deploy: wrangler deploy --env staging
# URL:    https://breeze-proxy-worker-staging.<your-subdomain>.workers.dev
#
# One-time setup (run these first, then fill in the IDs below):
#   wrangler d1 create tlc-volunteer-db-staging
#   wrangler kv:namespace create RSVP_STORE --env staging
#   wrangler secret put ADMIN_PASSWORD --env staging
#   wrangler secret put BREEZE_API_KEY --env staging
#   wrangler secret put BREEZE_SUBDOMAIN --env staging
#   wrangler secret put RESEND_API_KEY --env staging
#   wrangler secret put EMAIL_FROM --env staging
#   wrangler secret put BREVO_API_KEY --env staging
#   wrangler secret put BREVO_LIST_ID --env staging
#   wrangler secret put WORKER_SECRET --env staging
#   wrangler d1 migrations apply tlc-volunteer-db-staging --remote --env staging
[env.staging]
name = "breeze-proxy-worker-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "tlc-volunteer-db-staging"
database_id = "REPLACE_WITH_STAGING_DB_ID"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "RSVP_STORE"
id = "REPLACE_WITH_STAGING_KV_ID"

[[env.staging.r2_buckets]]
binding = "PHOTOS"
bucket_name = "tlc-chms-photos"

[env.staging.triggers]
crons = []
